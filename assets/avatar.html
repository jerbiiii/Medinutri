<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Avatar</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <script>
        let scene, camera, renderer, avatar, headMesh;
        let clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 1.2); // Focus on the face

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(1, 2, 2);
            scene.add(dirLight);

            window.addEventListener('resize', onWindowResize, false);
            animate();
            
            // Notify Flutter that HTML is ready
            if (window.FlutterChannel) {
                window.FlutterChannel.postMessage('ready');
            }
        }

        function loadAvatar(url) {
            if(avatar) {
                scene.remove(avatar);
            }
            const loader = new THREE.GLTFLoader();
            loader.load(url, function(gltf) {
                avatar = gltf.scene;
                scene.add(avatar);
                avatar.position.set(0, -0.6, 0); // Adjust vertical pos

                // Find head mesh for morph targets
                avatar.traverse((child) => {
                    if (child.isMesh && child.morphTargetDictionary) {
                        if (child.morphTargetDictionary['mouthOpen'] !== undefined || child.morphTargetDictionary['jawOpen'] !== undefined) {
                            headMesh = child;
                        }
                    }
                });
            }, undefined, function(error) {
                console.error("Error loading model", error);
            });
        }

        let speakingInterval = null;
        function setSpeaking(isSpeaking) {
            if (speakingInterval) {
                clearInterval(speakingInterval);
                speakingInterval = null;
            }
            if (isSpeaking && headMesh && headMesh.morphTargetDictionary) {
                const mouthOpenIndex = headMesh.morphTargetDictionary['mouthOpen'] !== undefined ? 
                                       headMesh.morphTargetDictionary['mouthOpen'] : 
                                       headMesh.morphTargetDictionary['jawOpen'];
                if (mouthOpenIndex !== undefined) {
                    speakingInterval = setInterval(() => {
                        // Fluctuate mouth Open randomly for lip sync illusion
                        headMesh.morphTargetInfluences[mouthOpenIndex] = Math.random() * 0.7 + 0.1;
                    }, 80);
                }
            } else {
                if (headMesh && headMesh.morphTargetDictionary) {
                    const mouthOpenIndex = headMesh.morphTargetDictionary['mouthOpen'] !== undefined ? 
                                           headMesh.morphTargetDictionary['mouthOpen'] : 
                                           headMesh.morphTargetDictionary['jawOpen'];
                    if(mouthOpenIndex !== undefined) {
                        headMesh.morphTargetInfluences[mouthOpenIndex] = 0;
                    }
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (avatar) {
                // Subtle idle head movement
                const time = Date.now() * 0.001;
                avatar.rotation.y = Math.sin(time * 0.5) * 0.05;
                avatar.rotation.x = Math.sin(time * 0.8) * 0.02;
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
