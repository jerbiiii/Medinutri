name: medinutri
description: "Application de télémédecine et nutrition IA."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  flutter_spinkit: ^5.2.2
  path: ^1.9.1
  path_provider: ^2.1.5
  http: ^1.6.0
  flutter_animate: ^4.5.2
  flutter_markdown: ^0.7.7+1
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  flutter_dotenv: ^5.1.0
  image_picker: ^1.1.2
  supabase_flutter: ^2.12.4
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  shared_preferences: ^2.5.5
  fl_chart: ^1.2.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/doctors/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
